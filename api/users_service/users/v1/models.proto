syntax = "proto3";

package users_service.users.v1;

option go_package = "users_service/users/v1;usersv1";

import "google/protobuf/timestamp.proto";

message User {
  string id = 1;
  string username = 2;
  string login = 3;
  string email = 4;
  optional string avatar_url = 5;
  google.protobuf.Timestamp created_at = 6;
}