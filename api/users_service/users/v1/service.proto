syntax = "proto3";

package users_service.users.v1;

option go_package = "users_service/users/v1;usersv1";

import "users_service/users/v1/models.proto";

service UsersService {
  // Создание пользователя
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);

  // Получение информации о пользователе
  rpc GetUserByID(GetUserByIDRequest) returns (GetUserByIDResponse);

  // Универсальный метод получения списка пользователей
  // Поддерживает: массовый запрос по ID, поиск по строке и обычную пагинацию
  rpc SerchUsers(SerchUsersRequest) returns (SerchUsersResponse);
}

message CreateUserRequest {
  // Имя пользователя
  string username = 1;
  // Логин для входа в систему
  string login = 2;
  // Email пользователя
  string email = 3;
  // Ссылка на изображение профиля
  optional string avatar_url = 4;
}

message CreateUserResponse {
  // Пользователь
  User user = 1;
}

message GetUserByIDRequest {
  // UUID пользователя
  string id = 1; 
}

message GetUserByIDResponse {
  // Данные пользователя
  User user = 1;
}

message SerchUsersRequest {
  // Поиск по подстроке (login или username) — полнотекстовый
  string query = 1;
  
  // Получение конкретных пользователей по списку их UUID
  repeated string user_ids = 2;
  
  // Точный поиск по логину
  string login = 3;

  // Смещение для пагинации
  int32 offset = 4;
  // Количество записей на страницу
  int32 limit = 5;
}

message SerchUsersResponse {
  // Список найденных пользователей
  repeated User users = 1;
  
  // Общее количество записей, подходящих под фильтр
  int32 count = 2;
}