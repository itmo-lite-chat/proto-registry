syntax = "proto3";

package chats_service.chats.v1;

option go_package = "chats_service/chats/v1;chatsv1";

import "google/protobuf/timestamp.proto";

message Chat {
  string id = 1;
  string type = 2; // private/group
  string title = 3;
  string owner_id = 4;
  string last_message_preview = 5;
  google.protobuf.Timestamp created_at = 6;
}

message ChatMember {
  string chat_id = 1;
  string user_id = 2;
  string role = 3;
  google.protobuf.Timestamp joined_at = 4;
  string last_read_message_id = 5; // С твоей схемы
}