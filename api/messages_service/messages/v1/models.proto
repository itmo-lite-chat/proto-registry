syntax = "proto3";

package messages_service.messages.v1;

option go_package = "messages_service/messages/v1;messagesv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// Тип контента
enum ContentType {
  CONTENT_TYPE_UNSPECIFIED = 0;
  // Текстовое сообщение
  CONTENT_TYPE_TEXT = 1;
  // Изображение
  CONTENT_TYPE_IMAGE = 2;
  // Файл
  CONTENT_TYPE_FILE = 3;
  // Стикер
  CONTENT_TYPE_STICKER = 4;
}

// Данные сообщения
message Content {
  // Тип контента
  ContentType type = 1;
  // Основное содержимое
  string body = 2;
  // Метаданные
  Metadata metadata = 3;
}

// Метаданные сообщения
message Metadata {
  // Размер файла
  int32 file_size_bytes = 1;
  // Длительность файла
  google.protobuf.Duration duration = 2;
  // Ширина файла
  int32 width = 3;
  // Высота файла
  int32 height = 4;
}

message Message {
  // ID сообщения
  int64 message_id = 1;
  // UUID чата
  string chat_id = 2;
  // UUID пользователя-отправителя
  string sender_id = 3;

  // Контент сообщения
  Content content = 4;

  // Время создания сообщения
  google.protobuf.Timestamp created_at = 5;
  // Время последнего редактирования
  google.protobuf.Timestamp updated_at = 6;
  // Время удаления
  google.protobuf.Timestamp deleted_at = 7;
  
  // ID сообщения, на которое ответил пользователь
  optional int64 reply_to_id = 8;
}