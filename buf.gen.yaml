version: v2
managed:
  enabled: true
plugins:
  - local: protoc-gen-go
    out: gen/services
    opt:
      - paths=source_relative

  - local: protoc-gen-go-grpc
    out: gen/services
    opt:
      - paths=source_relative

  - local: protoc-gen-validate
    out: gen/services
    opt:
      - paths=source_relative
      - lang=go

